<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rana Sabia - Smart Frog Edition</title>
    <style>
        :root {
            --water: #006064;
            --frog-skin: #43a047;
            --frog-light: #81c784;
            --frog-belly: #e8f5e9;
            --tongue: #ff5252;
            --leaf-green-light: #4caf50;
            --leaf-green-dark: #1b5e20;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--water);
            overflow: hidden;
            display: flex;
            justify-content: center;
            height: 100vh;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: radial-gradient(circle at 50% 100%, #00acc1 0%, #004d40 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Zurück Button --- */
        #back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 8px 12px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            z-index: 60;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* --- Header: Wort-Box --- */
        #word-box {
            margin-top: 60px; /* Leicht erhöht wegen dem Zurück-Button */
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 15px;
            font-size: 26px;
            font-weight: bold;
            color: #003300;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 50;
            border-bottom: 4px solid #2e7d32;
        }

        /* --- Realistischer CSS-Frosch mit Körper --- */
        #frog-scene {
            position: relative;
            width: 200px;
            height: 240px;
            margin-top: 10px;
            z-index: 10;
        }

        /* Hinterbeine */
        .leg {
            position: absolute;
            width: 45px;
            height: 80px;
            background: #1b5e20;
            border-radius: 40px;
            top: 100px;
            z-index: 1;
        }
        .leg.left { left: 10px; transform: rotate(-35deg); }
        .leg.right { right: 10px; transform: rotate(35deg); }
        .foot {
            position: absolute;
            width: 55px;
            height: 20px;
            background: #1b5e20;
            border-radius: 30px;
            bottom: -10px;
            left: -5px;
        }

        /* Körper & Bauch */
        .body-base {
            position: absolute;
            width: 140px;
            height: 140px;
            background: linear-gradient(to bottom, var(--frog-skin), #1b5e20);
            border-radius: 50% 50% 40% 40%;
            left: 30px;
            top: 70px;
            z-index: 2;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4);
        }
        .belly {
            position: absolute;
            width: 90px;
            height: 110px;
            background: radial-gradient(circle at 50% 100%, #ffffff, var(--frog-belly));
            border-radius: 50%;
            left: 25px;
            top: 25px;
            opacity: 0.8;
        }

        /* Kopf */
        .head {
            position: absolute;
            width: 120px;
            height: 85px;
            background: linear-gradient(135deg, var(--frog-skin) 0%, #1b5e20 100%);
            border-radius: 50% 50% 45% 45%;
            left: 40px;
            top: 20px;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .eye-socket {
            position: absolute;
            width: 46px;
            height: 42px;
            background: var(--frog-skin);
            border-radius: 50%;
            top: 5px;
            z-index: 6;
        }
        .eye-socket.left { left: 45px; }
        .eye-socket.right { right: 45px; }

        .eye-ball {
            position: absolute;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 40% 40%, #ffd600, #ff6f00);
            border-radius: 50%;
            top: 5px;
            left: 7px;
            border: 2px solid #1b5e20;
        }
        .pupil {
            position: absolute;
            width: 20px;
            height: 9px;
            background: #000;
            border-radius: 50%;
            top: 11px;
            left: 6px;
        }

        .mouth-arc {
            position: absolute;
            width: 80px;
            height: 20px;
            border-bottom: 3px solid #1b5e20;
            border-radius: 50%;
            top: 52px;
            left: 60px;
            opacity: 0.5;
            z-index: 6;
        }

        #tongue {
            position: absolute;
            top: 76px;
            left: 50%;
            width: 12px;
            height: 0;
            background: linear-gradient(to right, #ff5252, #d32f2f);
            z-index: 4;
            border-radius: 0 0 10px 10px;
            transform-origin: top center;
            transition: height 0.12s ease-out;
            pointer-events: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* --- Seerosen-Bereich --- */
        #fly-zone {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
        }

        .lily-pad {
            position: absolute;
            width: 130px;
            height: 110px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 6;
            animation: drift 5s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(-1deg); }
            50% { transform: translate(4px, 10px) rotate(2deg); }
        }

        .pad-base {
            position: absolute;
            width: 120px;
            height: 100px;
            background: radial-gradient(circle at 40% 40%, var(--leaf-green-light), var(--leaf-green-dark));
            z-index: 1;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            clip-path: path('M110,50 C110,80 90,100 60,100 C30,100 10,80 10,50 C10,20 30,0 60,0 C80,0 95,10 102,25 L60,50 Z');
            -webkit-clip-path: path('M110,50 C110,80 90,100 60,100 C30,100 10,80 10,50 C10,20 30,0 60,0 C80,0 95,10 102,25 L60,50 Z');
        }

        .fly-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fly-icon { font-size: 32px; display: block; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)); margin-bottom: -5px;}
        .fly-text { 
            font-size: 14px; 
            font-weight: bold; 
            color: white; 
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
            padding: 2px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        #score-info { color: white; font-weight: bold; margin-top: 5px; font-size: 17px; z-index: 60; position: relative;}

        #overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 5px 0 #1b5e20;
        }
    </style>
</head>
<body>

<div id="game-container">
    <button id="back-btn" onclick="goHome()">⬅ Zurück</button>
    <div id="word-box">Lade...</div>
    
    <div id="frog-scene">
        <div class="leg left"><div class="foot"></div></div>
        <div class="leg right"><div class="foot"></div></div>
        <div class="body-base"><div class="belly"></div></div>
        <div class="head"></div>
        <div class="eye-socket left"><div class="eye-ball"><div class="pupil"></div></div></div>
        <div class="eye-socket right"><div class="eye-ball"><div class="pupil"></div></div></div>
        <div class="mouth-arc"></div>
        <div id="tongue"></div>
    </div>

    <div id="score-info">Gelernt: 0 / 0</div>
    <div id="fly-zone"></div>

    <div id="overlay">
        <h1>🏆 ¡Increíble!</h1>
        <p id="win-text">Du hast alle Vokabeln gemeistert.</p>
        <button onclick="initGame()">Nochmal spielen</button>
    </div>
</div>

<script>
    let currentLvlVokabeln = [];
    let gameList = [];
    let currentIdx = 0;
    let isWaiting = false;
    let kategorieName = "Essen und Trinken"; // Fallback-Standard

    // 1. Kategorie aus den URL-Parametern auslesen
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('kategorie')) {
        kategorieName = urlParams.get('kategorie');
    }

    // 2. Vokabeln dynamisch laden
    fetch('../vokabeln.json')
        .then(res => {
            if(!res.ok) throw new Error('Fehler beim Laden der vokabeln.json: ' + res.status);
            return res.json();
        })
        .then(data => {
            const katData = data.find(k => k.kategorie === kategorieName);
            
            if (katData && katData.vokabeln.length >= 3) {
                currentLvlVokabeln = katData.vokabeln;
                initGame();
            } else {
                throw new Error('Kategorie nicht gefunden oder zu wenige Vokabeln vorhanden.');
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('word-box').innerText = 'Fehler';
            document.getElementById('score-info').innerText = 'Vokabeln konnten nicht geladen werden.';
        });

    function goHome() {
        window.location.href = '../index.html';
    }

    function initGame() {
        // Mische die geladenen Vokabeln der Kategorie und limitiere auf max 50
        gameList = [...currentLvlVokabeln].sort(() => Math.random() - 0.5).slice(0, 50);
        currentIdx = 0;
        document.getElementById('overlay').style.display = 'none';
        nextRound();
    }

    function nextRound() {
        if (currentIdx >= gameList.length) {
            document.getElementById('win-text').innerText = `Du hast alle ${gameList.length} Vokabeln gemeistert.`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }

        const word = gameList[currentIdx];
        document.getElementById('word-box').innerText = word.de;
        document.getElementById('score-info').innerText = `Gelernt: ${currentIdx} / ${gameList.length}`;

        const zone = document.getElementById('fly-zone');
        zone.innerHTML = '';

        let choices = [word.es];
        while(choices.length < 3) {
            let r = currentLvlVokabeln[Math.floor(Math.random() * currentLvlVokabeln.length)].es;
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach((txt, i) => {
            const pad = document.createElement('div');
            pad.className = 'lily-pad';
            pad.style.left = (5 + i * 32) + '%';
            pad.style.top = (10 + Math.random() * 50) + '%';
            pad.style.animationDelay = (Math.random() * 2) + "s";
            
            pad.innerHTML = `
                <div class="pad-base"></div>
                <div class="fly-content">
                    <span class="fly-icon">🪰</span>
                    <span class="fly-text">${txt}</span>
                </div>
            `;
            
            pad.onclick = () => {
                if(isWaiting) return;
                if(txt === word.es) {
                    catchFly(pad);
                } else {
                    pad.style.transition = "0.1s";
                    pad.style.transform = "scale(0.9) rotate(5deg)";
                    setTimeout(() => pad.style.transform = "scale(1) rotate(0deg)", 100);
                }
            };
            zone.appendChild(pad);
        });
    }

    function catchFly(padEl) {
        isWaiting = true;
        const tongue = document.getElementById('tongue');
        const flyIcon = padEl.querySelector('.fly-icon');
        const flyRect = flyIcon.getBoundingClientRect();
        const frogScene = document.getElementById('frog-scene').getBoundingClientRect();

        const startX = frogScene.left + (frogScene.width / 2);
        const startY = frogScene.top + 76;

        const targetX = flyRect.left + (flyRect.width / 2);
        const targetY = flyRect.top + (flyRect.height / 2);

        const dx = targetX - startX;
        const dy = targetY - startY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dx, dy) * (180 / Math.PI);

        tongue.style.transform = `translateX(-50%) rotate(${-angle}deg)`;
        tongue.style.height = distance + 'px';

        setTimeout(() => {
            flyIcon.style.visibility = 'hidden';
            tongue.style.height = '0';
            setTimeout(() => {
                currentIdx++;
                isWaiting = false;
                nextRound();
            }, 300);
        }, 150);
    }
</script>

</body>
</html>
