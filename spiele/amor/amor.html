<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amor de Idiomas Pro - Custom Assets</title>
    <style>
        :root {
            --heart-red: radial-gradient(circle at 30% 30%, #ff5c8a, #a01a58);
            --bg: #0f0f1a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Zurück-Button Styling */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s, transform 0.2s;
            z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding-top: 40px;
        }
        .german-word {
            font-size: 30px;
            font-weight: bold;
            color: #ff85a1;
            text-shadow: 0 0 15px rgba(255, 133, 161, 0.6);
            margin-bottom: 20px;
            min-height: 40px;
        }

        /* Amor Bild-Container */
        .cupid-wrapper {
            position: relative;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cupid-img {
            height: 195px;
            z-index: 2;
        }
        #arrow-projectile {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 78px; 
            height: auto;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        /* V-Layout für Herzen */
        .v-grid {
            position: relative;
            height: 380px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 380px;
        }
        .bottom-row {
            margin-top: 30px;
        }

        .heart {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--heart-red);
            clip-path: path('M75 45 C75 0 0 0 0 52 C0 105 75 150 75 150 C75 150 150 105 150 52 C150 0 75 0 75 45');
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: heartBeat 1.4s infinite ease-in-out;
            position: relative;
            transition: opacity 0.5s ease;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        /* Animation für das zerbrechende Herz */
        .heart.broken {
            animation: breakHeart 0.6s forwards ease-in;
            pointer-events: none;
        }

        @keyframes breakHeart {
            0% {
                transform: scale(1);
                clip-path: path('M75 45 C75 0 0 0 0 52 C0 105 75 150 75 150 C75 150 150 105 150 52 C150 0 75 0 75 45');
            }
            50% {
                transform: scale(1.1) translateY(10px);
                clip-path: path('M75 45 C75 0 0 0 0 52 C0 105 70 140 70 150 L65 90 L80 70 L65 50 L75 45 C75 0 150 0 150 52 C150 105 80 140 80 150 L65 90 L80 70 L65 50 Z');
            }
            100% {
                transform: scale(0.8) translateY(50px);
                opacity: 0;
                clip-path: path('M73 45 C73 0 0 0 0 52 C0 105 60 140 55 150 L50 90 L60 70 L45 50 L73 45 M77 45 C77 0 150 0 150 52 C150 105 90 140 95 150 L100 90 L90 70 L105 50 Z');
            }
        }

        .heart-text {
            color: white;
            font-size: 15px;
            font-weight: 900;
            padding: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            transition: opacity 0.3s;
        }
        
        .heart.broken .heart-text {
            opacity: 0;
        }

        .hidden { display: none; }
        #score { color: #888; font-size: 14px; margin-top: 10px; }
        .action-btn {
            background: linear-gradient(#ffd700, #ff8c00);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<a href="../../index.html" class="back-btn">⬅ Zurück</a>

<div id="game-container">
    <div id="quiz-section">
        <div class="german-word" id="word-to-translate">Lade Vokabeln...</div>
        
        <div class="cupid-wrapper">
            <img src="relaxed.png" id="amor-relax" class="cupid-img" alt="Amor entspannt">
            <img src="gespannt.png" id="amor-shoot" class="cupid-img hidden" alt="Amor gespannt">
            
            <img src="pfeil.png" id="arrow-projectile" alt="Pfeil">
        </div>

        <div class="v-grid" id="choices-container">
            <div class="top-row">
                <div id="h0"></div>
                <div id="h1"></div>
            </div>
            <div class="bottom-row">
                <div id="h2"></div>
            </div>
        </div>
        
        <p id="score">💘 <span id="current">1</span> / <span id="total">--</span></p>
    </div>

    <div id="result-section" class="hidden">
        <h2>¡Maestro de Corazones! ❤️</h2>
        <p>Du hast alle Vokabeln dieser Kategorie gemeistert.</p>
        <button class="action-btn" onclick="startGame()">Nochmal von vorn</button>
    </div>
</div>

<script>
    let vocabulary = [];
    let currentList = [];
    let currentIndex = 0;
    let kategorieName = "Dating und Gefühle"; 
    let isTransitioning = false;

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('kategorie')) {
        kategorieName = urlParams.get('kategorie');
    }

    fetch('../../vokabeln.json')
        .then(response => response.json())
        .then(data => {
            const katData = data.find(k => k.kategorie === kategorieName);
            if (katData && katData.vokabeln.length > 0) {
                vocabulary = katData.vokabeln;
                document.getElementById('total').innerText = vocabulary.length;
                startGame();
            } else {
                document.getElementById('word-to-translate').innerText = "Fehler!";
                alert(`Kategorie "${kategorieName}" wurde nicht gefunden oder ist leer.`);
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('word-to-translate').innerText = "Fehler!";
            alert("vokabeln.json konnte nicht geladen werden.");
        });

    function startGame() {
        if (vocabulary.length === 0) return;
        currentList = [...vocabulary].sort(() => Math.random() - 0.5);
        currentIndex = 0;
        isTransitioning = false;
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('result-section').classList.add('hidden');
        showNext();
    }

    function showNext() {
        if (currentIndex >= currentList.length) return showResults();
        
        const q = currentList[currentIndex];
        document.getElementById('word-to-translate').innerText = q.de;
        document.getElementById('current').innerText = currentIndex + 1;

        let options = [q.es];
        let maxOptions = Math.min(3, vocabulary.length);
        
        while(options.length < maxOptions) {
            let r = vocabulary[Math.floor(Math.random() * vocabulary.length)].es;
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        for(let i=0; i<3; i++) {
            const container = document.getElementById(`h${i}`);
            if (options[i]) {
                container.innerHTML = `<div class="heart" onclick="fire(this, '${options[i]}', '${q.es}')"><span class="heart-text">${options[i]}</span></div>`;
            } else {
                container.innerHTML = '';
            }
        }
        isTransitioning = false;
    }

    function fire(target, selected, correct) {
        if (isTransitioning) return; 
        isTransitioning = true;

        const arrow = document.getElementById('arrow-projectile');
        const amorRelax = document.getElementById('amor-relax');
        const amorShoot = document.getElementById('amor-shoot');
        
        const tRect = target.getBoundingClientRect();
        const cRect = amorRelax.getBoundingClientRect();

        const x = tRect.left + tRect.width/2 - (cRect.left + cRect.width/2);
        const y = tRect.top + tRect.height/2 - (cRect.top + cRect.height/2);

        amorRelax.classList.add('hidden');
        amorShoot.classList.remove('hidden');

        arrow.style.transition = 'none';
        arrow.style.opacity = '1';
        arrow.style.transform = 'translate(-50%, -50%)';

        setTimeout(() => {
            arrow.style.transition = 'transform 0.4s ease-in, opacity 0.3s';
            arrow.style.transform = `translate(${x}px, ${y}px) rotate(${Math.atan2(y, x)}rad)`;
        }, 50);

        setTimeout(() => {
            arrow.style.opacity = '0';
            amorShoot.classList.add('hidden');
            amorRelax.classList.remove('hidden');

            if(selected === correct) {
                currentIndex++;
                showNext();
            } else {
                // Falsche Antwort: Herz zerbricht
                target.classList.add('broken');
                
                // Setzt die Optionen nach Ablauf der Animation (600ms) lautlos zurück
                setTimeout(() => {
                    showNext();
                }, 600);
            }
        }, 450);
    }

    function showResults() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
    }
</script>
</body>
</html>
