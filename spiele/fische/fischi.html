<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spanisch Lernen - Fisch Spiel</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1cb5e0, #000046);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
            position: relative;
        }

        /* Zurück-Button Styling */
        .back-btn {
            position: absolute;
            top: 12px;
            left: 15px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.2s;
            z-index: 10;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        #header {
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        #game-container {
            flex: 1;
            display: flex;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .left-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
        }

        #main-fish-scale-wrapper {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.6s ease-in-out, top 0.6s ease-in-out;
            position: relative;
            left: 0px;
            top: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        .fish-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        @keyframes floatAnimation {
            0% { transform: translate(0, 0px) rotate(0deg); }
            50% { transform: translate(5px, -8px) rotate(1deg); }
            100% { transform: translate(0, 0px) rotate(0deg); }
        }

        .floating {
            animation: floatAnimation 4s ease-in-out infinite;
        }

        .number-bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 80px;
            transition: opacity 0.2s ease;
        }

        .right-side .number-bubble {
            font-size: 1.2rem;
            background: #ffeb3b;
            color: #000;
        }

        .fish-img {
            width: 120px;
            height: auto;
            object-fit: contain;
            border: none;
            outline: none;
            min-height: 90px;
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over h1 {
            font-size: 2.5rem;
            color: #4caf50;
            margin-bottom: 10px;
        }

        .btn {
            background: #2196f3;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-btn">⬅ Menü</a>

    <div id="header">
        Runde: <span id="current-round">1</span>/<span id="total-rounds">--</span> | Punkte: <span id="score">0</span>
    </div>

    <div id="game-container">
        <div class="left-side">
            <div id="main-fish-scale-wrapper">
                <div class="fish-container floating" id="fisch1-container">
                    <div id="target-number" class="number-bubble">Lade...</div>
                    <img src="fisch1.png" alt="Fisch 1" class="fish-img">
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="fish-container floating" id="option-container-0" onclick="checkAnswer(0)" style="animation-delay: -1s;">
                <div id="option-0" class="number-bubble">Wort 1</div>
                <img src="fisch2.png" alt="Fisch 2" class="fish-img">
            </div>

            <div class="fish-container floating" id="option-container-1" onclick="checkAnswer(1)" style="animation-delay: -2s;">
                <div id="option-1" class="number-bubble">Wort 2</div>
                <img src="fisch3.png" alt="Fisch 3" class="fish-img">
            </div>
        </div>
    </div>

    <div id="game-over">
        <h1>¡Felicitaciones!</h1>
        <p>Du hast alle Vokabeln dieser Kategorie durchgespielt!</p>
        <p>Endpunkte: <span id="final-score">0</span></p>
        <button class="btn" onclick="restartGame()">Von vorne beginnen</button>
    </div>

    <script>
        let vocabulary = [];
        let currentRound = 1;
        let score = 0;
        let currentScale = 1.0; 
        let correctAnswerIndex = 0;
        let usedWords = [];
        let isAnimating = false;
        let kategorieName = "Zahlen"; // Fallback, falls kein Parameter übergeben wird

        // 1. URL-Parameter auslesen
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('kategorie')) {
            kategorieName = urlParams.get('kategorie');
        }

        // 2. JSON-Datei laden
        fetch('../../vokabeln.json')
            .then(response => response.json())
            .then(data => {
                const katData = data.find(k => k.kategorie === kategorieName);
                if (katData && katData.vokabeln.length > 0) {
                    vocabulary = katData.vokabeln;
                    document.getElementById('total-rounds').innerText = vocabulary.length;
                    startGame();
                } else {
                    document.getElementById('target-number').innerText = "Fehler";
                    alert(`Kategorie "${kategorieName}" wurde nicht gefunden oder ist leer.`);
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('target-number').innerText = "Fehler";
                alert("vokabeln.json konnte nicht geladen werden.");
            });

        function startGame() {
            if (vocabulary.length === 0) return;
            currentRound = 1;
            score = 0;
            currentScale = 1.0;
            usedWords = [];
            isAnimating = false;
            document.getElementById('game-over').style.display = 'none';
            resetFishPositions();
            updateScoreboard();
            nextQuestion();
        }

        function nextQuestion() {
            if (currentRound > vocabulary.length) {
                endGame();
                return;
            }

            document.getElementById('current-round').innerText = currentRound;

            // Ein noch nicht verwendetes Wort aussuchen
            let targetObj;
            let safetyCounter = 0;
            do {
                targetObj = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                safetyCounter++;
            } while (usedWords.includes(targetObj) && safetyCounter < 1000);
            
            usedWords.push(targetObj);
            
            // Gesuchtes deutsches Wort anzeigen
            document.getElementById('target-number').innerText = targetObj.de;

            const correctTranslation = targetObj.es;

            // Falsche Antwort generieren
            let wrongObj;
            if (vocabulary.length > 1) {
                do {
                    wrongObj = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                } while (wrongObj === targetObj);
            } else {
                wrongObj = { es: "---" }; // Ausfallsicherung bei Kategorien mit nur 1 Vokabel
            }
            const wrongTranslation = wrongObj.es;

            correctAnswerIndex = Math.floor(Math.random() * 2);

            if (correctAnswerIndex === 0) {
                document.getElementById('option-0').innerText = correctTranslation;
                document.getElementById('option-1').innerText = wrongTranslation;
            } else {
                document.getElementById('option-0').innerText = wrongTranslation;
                document.getElementById('option-1').innerText = correctTranslation;
            }

            resetFishPositions();
            isAnimating = false;
        }

        function checkAnswer(selectedIndex) {
            if (isAnimating) return;
            isAnimating = true;

            const mainFishWrapper = document.getElementById('main-fish-scale-wrapper');
            const targetFishContainer = document.getElementById(`option-container-${selectedIndex}`);
            
            const mainRect = mainFishWrapper.getBoundingClientRect();
            const targetRect = targetFishContainer.getBoundingClientRect();

            const deltaX = (targetRect.left + targetRect.width / 2) - (mainRect.left + mainRect.width / 2);
            const deltaY = (targetRect.top + targetRect.height / 2) - (mainRect.top + mainRect.height / 2);

            mainFishWrapper.style.left = `${deltaX}px`;
            mainFishWrapper.style.top = `${deltaY}px`;

            if (selectedIndex === correctAnswerIndex) {
                score++;
                currentScale += 0.05;
            } else {
                currentScale = Math.max(0.5, currentScale - 0.15);
            }

            setTimeout(() => {
                targetFishContainer.style.opacity = '0';
            }, 400);

            setTimeout(() => {
                applyScale();
                updateScoreboard();
                currentRound++;
                setTimeout(nextQuestion, 200);
            }, 700);
        }

        function resetFishPositions() {
            const mainFishWrapper = document.getElementById('main-fish-scale-wrapper');
            mainFishWrapper.style.transition = 'none';
            mainFishWrapper.style.left = '0px';
            mainFishWrapper.style.top = '0px';
            applyScale();

            document.getElementById('option-container-0').style.opacity = '1';
            document.getElementById('option-container-1').style.opacity = '1';

            setTimeout(() => {
                mainFishWrapper.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.6s ease-in-out, top 0.6s ease-in-out';
            }, 50);
        }

        function applyScale() {
            const scaleWrapper = document.getElementById('main-fish-scale-wrapper');
            scaleWrapper.style.transform = `scale(${currentScale})`;
        }

        function updateScoreboard() {
            document.getElementById('score').innerText = score;
        }

        function endGame() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            startGame();
        }
    </script>
</body>
</html>
