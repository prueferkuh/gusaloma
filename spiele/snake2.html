<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake II - Vokabel Edition</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #252532;
            --accent-gold: #f1c40f;
            --accent-blue: #3498db;
            --text-color: #ffffff;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            touch-action: manipulation;
        }

        body { padding: 10px; display: flex; flex-direction: column; align-items: center; }

        .back-link { color: var(--accent-blue); text-decoration: none; font-weight: bold; margin: 10px 0; align-self: flex-start; }

        #game-container {
            display: flex; flex-direction: column; align-items: center;
            background: var(--panel-bg); padding: 15px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #333;
            width: 100%; max-width: 600px; box-sizing: border-box;
        }

        #info-panel {
            display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px;
            font-size: 1rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;
            align-items: center; box-sizing: border-box;
        }

        #task-display { font-size: 1.3rem; font-weight: bold; text-align: center; margin-bottom: 15px; color: var(--accent-gold); min-height: 35px; }

        .canvas-wrapper { width: 100%; position: relative; }

        canvas {
            background-color: #0d0d13; border: 4px solid #444; border-radius: 8px;
            display: block; width: 100%; height: auto; box-sizing: border-box;
        }

        #dpad-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            pointer-events: none; z-index: 5;
        }
        .dpad-btn { 
            display: flex; align-items: center; justify-content: center; 
            color: rgba(255,255,255,0.08); font-size: 1.6rem; 
            pointer-events: auto;
            user-select: none; -webkit-user-select: none;
        }
        .dpad-btn:active { background: rgba(255, 255, 255, 0.04); border-radius: 4px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .overlay-box { background: var(--panel-bg); padding: 25px; border-radius: 16px; text-align: center; border: 2px solid var(--accent-gold); width: 90%; max-width: 400px; box-sizing: border-box; }
        .overlay button { background: var(--accent-gold); color: #1a1a24; border: none; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-link">← Menü</a>
    
    <div id="game-container">
        <div id="info-panel">
            <div>Kat: <span id="current-category" style="color:var(--accent-blue);">Lade...</span></div>
            <div id="mode-badge" style="font-size: 0.8rem; font-weight: bold; background: #e67e22; color: #fff; padding: 2px 6px; border-radius: 4px; display: none;">SUPER-RUNDE</div>
            <div>Score: <span id="score-display" style="font-weight:bold; color:#2ecc71;">0</span></div>
        </div>
        
        <div id="task-display">Sammle die richtige Übersetzung</div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div id="dpad-layer">
                <div></div><div class="dpad-btn" ontouchstart="changeDirection('UP')" onclick="changeDirection('UP')">▲</div><div></div>
                <div class="dpad-btn" ontouchstart="changeDirection('LEFT')" onclick="changeDirection('LEFT')">◀</div><div></div><div class="dpad-btn" ontouchstart="changeDirection('RIGHT')" onclick="changeDirection('RIGHT')">▶</div>
                <div></div><div class="dpad-btn" ontouchstart="changeDirection('DOWN')" onclick="changeDirection('DOWN')">▼</div><div></div>
            </div>
        </div>
    </div>

    <div id="game-overlay" class="overlay" style="display:none;">
        <div class="overlay-box">
            <h2 id="overlay-title">Bereit?</h2>
            <p id="overlay-text">Lade Vokabeln...</p>
            <button id="overlay-button" onclick="closeOverlayAndStart()">Spiel starten</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridBox = 20;
        let snake = [], dir = "RIGHT", score = 0, gameInterval = null, speed = 130;
        let alleVokabeln = [], aktuelleFrage = null, richtigesFutter = null, falschesFutter = null, falschesFutter2 = null;
        let richtigeAntwortenZaehler = 0, istSuperfoodRunde = false;
        let richtrungGesperrt = false;

        // --- GLOBAL DIRECTION CONTROL ---
        function changeDirection(newDir) {
            if (richtrungGesperrt) return;

            if (newDir === "LEFT" && dir !== "RIGHT") { dir = "LEFT"; richtrungGesperrt = true; }
            else if (newDir === "UP" && dir !== "DOWN") { dir = "UP"; richtrungGesperrt = true; }
            else if (newDir === "RIGHT" && dir !== "LEFT") { dir = "RIGHT"; richtrungGesperrt = true; }
            else if (newDir === "DOWN" && dir !== "UP") { dir = "DOWN"; richtrungGesperrt = true; }
        }

        // --- SWIPE STEUERUNG (GLOBAL) ---
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (e.changedTouches.length === 1) {
                let dx = e.changedTouches[0].clientX - touchStartX;
                let dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        changeDirection(dx > 0 ? "RIGHT" : "LEFT");
                    } else {
                        changeDirection(dy > 0 ? "DOWN" : "UP");
                    }
                }
            }
        }, { passive: true });

        // --- TASTATUR STEUERUNG (WASD & Pfeiltasten) ---
        document.addEventListener('keydown', e => {
            const k = e.keyCode;
            if (k >= 37 && k <= 40) e.preventDefault();
            
            if (k === 37 || k === 65) changeDirection("LEFT");
            else if (k === 38 || k === 87) changeDirection("UP");
            else if (k === 39 || k === 68) changeDirection("RIGHT");
            else if (k === 40 || k === 83) changeDirection("DOWN");
        });

        // --- DATA LOAD ---
        fetch('../vokabeln.json')
            .then(r => r.json())
            .then(data => {
                const kat = new URLSearchParams(window.location.search).get('kategorie') || "Essen und Trinken";
                const katData = data.find(k => k.kategorie === kat);
                if (katData && katData.vokabeln.length >= 3) {
                    alleVokabeln = katData.vokabeln;
                    document.getElementById('current-category').innerText = kat;
                    showOverlay("Snake II", "Finde die richtige Übersetzung. WASD, Pfeiltasten, D-Pad oder Wischen aktiv!");
                } else {
                    showOverlay("Fehler ❌", "Kategorie nicht gefunden oder zu wenige Vokabeln (min. 3 benötigt).");
                }
            });

        function showOverlay(t, txt) {
            document.getElementById('overlay-title').innerText = t;
            document.getElementById('overlay-text').innerText = txt;
            document.getElementById('game-overlay').style.display = 'flex';
        }

        function closeOverlayAndStart() {
            document.getElementById('game-overlay').style.display = 'none';
            initGame();
        }

        function initGame() {
            snake = [
                {x: 10 * gridBox, y: 10 * gridBox},
                {x: 9 * gridBox, y: 10 * gridBox},
                {x: 8 * gridBox, y: 10 * gridBox}
            ];
            dir = "RIGHT"; score = 0; richtigeAntwortenZaehler = 0;
            document.getElementById('score-display').innerText = score;
            neueRunde();
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(draw, speed);
        }

        function neueRunde() {
            istSuperfoodRunde = (richtigeAntwortenZaehler > 0 && richtigeAntwortenZaehler % 5 === 0);
            document.getElementById('mode-badge').style.display = istSuperfoodRunde ? 'block' : 'none';
            
            const rndi = Math.floor(Math.random() * alleVokabeln.length);
            aktuelleFrage = alleVokabeln[rndi];
            document.getElementById('task-display').innerText = `Gesucht: "${aktuelleFrage.de}"`;

            let fali = Math.floor(Math.random() * alleVokabeln.length);
            while (alleVokabeln[fali].id === aktuelleFrage.id) fali = Math.floor(Math.random() * alleVokabeln.length);
            
            richtigesFutter = generierePos();
            
            falschesFutter = generierePos();
            while(falschesFutter.x === richtigesFutter.x && falschesFutter.y === richtigesFutter.y) {
                falschesFutter = generierePos();
            }

            if (istSuperfoodRunde) {
                falschesFutter2 = generierePos();
                while(
                    (falschesFutter2.x === richtigesFutter.x && falschesFutter2.y === richtigesFutter.y) ||
                    (falschesFutter2.x === falschesFutter.x && falschesFutter2.y === falschesFutter.y)
                ) {
                    falschesFutter2 = generierePos();
                }
                falschesFutter2.text = alleVokabeln[(fali + 1) % alleVokabeln.length].es;
            } else {
                falschesFutter2 = null;
            }

            richtigesFutter.text = aktuelleFrage.es;
            falschesFutter.text = alleVokabeln[fali].es;
        }

        function generierePos() {
            let pos;
            let aufSchlange = true;
            while(aufSchlange) {
                pos = {
                    x: Math.floor(Math.random() * (canvas.width / gridBox)) * gridBox,
                    y: Math.floor(Math.random() * ((canvas.height / gridBox) - 3) + 2) * gridBox
                };
                aufSchlange = snake.some(s => s.x === pos.x && s.y === pos.y);
            }
            return pos;
        }

        function drawFoodLabel(f) {
            if (!f) return;
            ctx.font = "bold 28px 'Segoe UI', Tahoma, sans-serif";
            ctx.textBaseline = "middle";
            const tw = ctx.measureText(f.text).width;
            const x = f.x + (gridBox/2) - (tw/2);
            const y = (f.y < 30) ? f.y + gridBox + 20 : f.y - 15;
            
            ctx.lineWidth = 5; ctx.strokeStyle = "#0d0d13"; ctx.strokeText(f.text, x, y);
            ctx.fillStyle = "#fff"; ctx.fillText(f.text, x, y);
        }

        function draw() {
            richtrungGesperrt = false;

            ctx.fillStyle = "#0d0d13"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#f1c40f";
            
            [richtigesFutter, falschesFutter, falschesFutter2].forEach(f => { if(f) ctx.fillRect(f.x, f.y, gridBox-1, gridBox-1); });
            [richtigesFutter, falschesFutter, falschesFutter2].forEach(drawFoodLabel);

            let head = {x: snake[0].x + (dir==="RIGHT"?gridBox:dir==="LEFT"?-gridBox:0), y: snake[0].y + (dir==="DOWN"?gridBox:dir==="UP"?-gridBox:0)};
            
            if (head.x < 0) head.x = canvas.width-gridBox; else if (head.x >= canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height-gridBox; else if (head.y >= canvas.height) head.y = 0;
            
            for(let i = 0; i < snake.length; i++) {
                if(head.x === snake[i].x && head.y === snake[i].y) { gameOver(); return; }
            }

            snake.unshift(head);
            
            if (head.x === richtigesFutter.x && head.y === richtigesFutter.y) {
                score += istSuperfoodRunde ? 20 : 10;
                richtigeAntwortenZaehler++;
                document.getElementById('score-display').innerText = score;
                neueRunde();
            } else if ((falschesFutter && head.x === falschesFutter.x && head.y === falschesFutter.y) || (falschesFutter2 && head.x === falschesFutter2.x && head.y === falschesFutter2.y)) {
                score = Math.max(0, score - (istSuperfoodRunde ? 10 : 5));
                document.getElementById('score-display').innerText = score;
                
                snake.pop(); 
                if (snake.length > 2) snake.pop(); 
                neueRunde();
            } else {
                snake.pop();
            }

            ctx.fillStyle = "#3498db";
            snake.forEach((s, idx) => {
                ctx.fillStyle = (idx === 0) ? "#3498db" : "#2980b9";
                ctx.fillRect(s.x, s.y, gridBox-1, gridBox-1);
            });
        }

        function gameOver() {
            clearInterval(gameInterval);
            showOverlay("Game Over! 💀", `Endstand: ${score} Punkte.`);
            document.getElementById('overlay-button').innerText = "Erneut versuchen";
        }
    </script>
</body>
</html>
