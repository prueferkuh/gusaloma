<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gusaloma - Vokabeltrainer</title>
    <style>
        /* Standard Dark-Mode Variablen */
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #252532;
            --accent-blue: #3498db;
            --accent-gold: #f1c40f;
            --text-color: #ffffff;
            --text-muted: #888892;
            --btn-bg: rgba(0, 0, 0, 0.2);
            --btn-border: #444;
            --container-border: #333;
            --shadow: rgba(0,0,0,0.5);
        }

        /* Light-Mode Variablen */
        :root.light-mode {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --accent-blue: #2980b9;
            --accent-gold: #d4ac0d;
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
            --btn-bg: #f8f9fa;
            --btn-border: #dcdde1;
            --container-border: #e1e8ed;
            --shadow: rgba(0,0,0,0.1);
        }

        html, body {
            overscroll-behavior-y: contain;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        /* Styling für das neue Logo */
        .app-logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
            display: inline-block;
        }

        header h1 {
            color: var(--accent-blue);
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
        }

        /* --- STYLING FÜR DEN SLIDE-REGLER --- */
        .theme-switch-container {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-switch-label {
            font-size: 1.2rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-blue);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* --- CONTAINER & BUTTONS --- */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 2px solid var(--container-border);
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent-gold);
            border-bottom: 1px solid var(--container-border);
            padding-bottom: 8px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 2px solid var(--btn-border);
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .category-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(52, 152, 219, 0.1);
        }

        .category-btn.active {
            border-color: var(--accent-blue);
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-btn {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 2px solid var(--btn-border);
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            width: 100%;
        }

        .game-btn:not(.disabled):hover {
            border-color: var(--accent-gold);
            background: rgba(241, 196, 15, 0.05);
            transform: translateY(-2px);
        }

        .game-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--container-border);
            background: var(--btn-bg);
        }

        .badge {
            font-size: 0.75rem;
            background: var(--btn-border);
            padding: 4px 8px;
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .game-btn:not(.disabled) .badge {
            background: rgba(241, 196, 15, 0.2);
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <header>
        <div class="theme-switch-container">
            <span class="theme-switch-label" id="theme-icon">🌙</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                <span class="slider"></span>
            </label>
        </div>
        <img src="invertLogo.png" id="main-logo" class="app-logo" alt="Gusaloma Logo">
        <h1>GusalomaVocab ♤♡◇♧</h1>
        <p>Spanisch lernen spielerisch leicht</p>
    </header>

    <div class="container">
        <h2>1. Wähle eine Vokabelkategorie:</h2>
        <div class="category-grid" id="categoryGrid">
            </div>
    </div>

    <div class="container">
        <h2>2. Wähle eine Spiele-Herausforderung:</h2>
        <div class="game-list">
            
            <button class="game-btn disabled" id="btn-quiz" onclick="startGame('Quiz gegen die Zeit')">
                <span>⏱️ Quiz gegen die Zeit</span>
                <span class="badge">Allrounder</span>
            </button>

            <button class="game-btn disabled" id="btn-snake" onclick="startGame('Snake II')">
                <span>🐍 Snake II</span>
                <span class="badge">Retro Action</span>
            </button>

            <button class="game-btn disabled" id="btn-koffer" onclick="startGame('Ich packe meinen Koffer')">
                <span>🧳 Ich packe meinen Koffer</span>
                <span class="badge">Kleidung</span>
            </button>

            <button class="game-btn disabled" id="btn-pizza" onclick="startGame('Pizza belegen')">
                <span>🍕 Pizza belegen</span>
                <span class="badge">Essen</span>
            </button>

            <button class="game-btn disabled" id="btn-amors" onclick="startGame('Amors Pfeil')">
                <span>💘 Amors Pfeil</span>
                <span class="badge">Dating & Liebe</span>
            </button>

            <button class="game-btn disabled" id="btn-highway" onclick="startGame('Highway to Bilingual')">
                <span>🚗 Highway to Bilingual</span>
                <span class="badge">Fahrzeuge</span>
            </button>

            <button class="game-btn disabled" id="btn-frosch" onclick="startGame('Der Frosch')">
                <span>🐸 Der Frosch</span>
                <span class="badge">Natur & Tiere</span>
            </button>

            <button class="game-btn disabled" id="btn-memory" onclick="startGame('Memory')">
                <span>🃏 Vokabel-Memory</span>
                <span class="badge">Karten</span>
            </button>

            <button class="game-btn disabled" id="btn-angelbear" onclick="startGame('Angelbär')">
                <span>🐻 Angelbär</span>
                <span class="badge">Fischen</span>
            </button>
            
        </div>
    </div>

    <script>
        let aktuelleKategorie = ""; 
        let kategorien = [];

        // Theme-Zustand beim Laden initialisieren
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const toggleInput = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            const logo = document.getElementById('main-logo');

            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
                toggleInput.checked = true;
                icon.textContent = '☀️';
                logo.src = 'Logo.png'; // NEU: Lädt helles Logo
            } else {
                icon.textContent = '🌙';
                logo.src = 'invertLogo.png'; // NEU: Lädt dunkles Logo (Invertiert)
            }
        });

        /**
         * Schaltet zwischen Light- und Darkmode um & wechselt das Logo
         */
        function toggleTheme() {
            const toggleInput = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            const logo = document.getElementById('main-logo');

            if (toggleInput.checked) {
                document.documentElement.classList.add('light-mode');
                icon.textContent = '☀️';
                logo.src = 'Logo.png'; // NEU: Wechselt zu Logo.png
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.remove('light-mode');
                icon.textContent = '🌙';
                logo.src = 'invertLogo.png'; // NEU: Wechselt zu invertLogo.png
                localStorage.setItem('theme', 'dark');
            }
        }

        // Lade die Kategorien beim Laden der Seite
        fetch('vokabeln.json')
            .then(response => response.json())
            .then(data => {
                kategorien = data.map(item => item.kategorie);
                renderKategorieButtons();
            })
            .catch(error => console.error('Fehler beim Laden der Kategorien:', error));

        function renderKategorieButtons() {
            const categoryGrid = document.getElementById('categoryGrid');
            categoryGrid.innerHTML = '';

            kategorien.forEach(kategorie => {
                const button = document.createElement('button');
                button.className = 'category-btn';
                button.textContent = kategorie;
                button.onclick = function() {
                    waehleKategorie(this, kategorie);
                };
                categoryGrid.appendChild(button);
            });
        }

        function waehleKategorie(element, kategorieName) {
            aktuelleKategorie = kategorieName;

            document.querySelectorAll('.category-grid .category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            document.querySelectorAll('.game-list .game-btn').forEach(btn => {
                btn.classList.remove('disabled');
            });
        }

        function startGame(spielName) {
            if (!aktuelleKategorie) {
                alert("Bitte wähle zuerst oben eine passende Vokabelkategorie aus!");
                return;
            }

            let dateiPfad = "";

            if (spielName === "Quiz gegen die Zeit") {
                dateiPfad = "spiele/quiz-zeit.html";
            } else if (spielName === "Snake II") {
                dateiPfad = "spiele/snake2.html";
            } else if (spielName === "Memory" || spielName === "Vokabel-Memory") {
                dateiPfad = "spiele/memory.html";
            } else if (spielName === "Der Frosch") {
                dateiPfad = "spiele/derFrosch.html";
            } else if (spielName === "Angelbär") {
                dateiPfad = "spiele/angelnBaer/Angelnb7.html";
            } else {
                alert(`Das Spiel "${spielName}" wird aktuell noch von uns entwickelt und steht bald bereit!`);
                return;
            }

            if (!dateiPfad) {
                alert(`Kein Pfad für das Spiel "${spielName}" gefunden.`);
                return;
            }

            fetch(dateiPfad, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        window.location.href = `${dateiPfad}?kategorie=${encodeURIComponent(aktuelleKategorie)}`;
                    } else {
                        alert(`Das Spiel "${spielName}" ist derzeit nicht verfügbar (Seite ${dateiPfad} fehlt).`);
                    }
                })
                .catch(() => {
                    fetch(dateiPfad)
                        .then(r => {
                            if (r.ok) window.location.href = `${dateiPfad}?kategorie=${encodeURIComponent(aktuelleKategorie)}`;
                            else alert(`Das Spiel "${spielName}" ist derzeit nicht verfügbar (Seite ${dateiPfad} fehlt).`);
                        })
                        .catch(() => {
                            alert(`Das Spiel "${spielName}" ist derzeit nicht verfügbar (Seite ${dateiPfad} fehlt).`);
                        });
                });
        }
    </script>

</body>
</html>
