<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViajeVocab - Vokabeltrainer</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #252532;
            --accent-blue: #3498db;
            --accent-gold: #f1c40f;
            --text-color: #ffffff;
            --text-muted: #888892;
        }

        html, body {
            overscroll-behavior-y: contain;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent-blue);
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent-gold);
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        /* Kategorie-Buttons */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            border: 2px solid #444;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .category-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(52, 152, 219, 0.1);
        }

        .category-btn.active {
            border-color: var(--accent-blue);
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        /* Spiele-Liste */
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-btn {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            border: 2px solid #444;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            width: 100%;
        }

        .game-btn:not(.disabled):hover {
            border-color: var(--accent-gold);
            background: rgba(241, 196, 15, 0.05);
            transform: translateY(-2px);
        }

        .game-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #333;
            background: #1e1e26;
        }

        .badge {
            font-size: 0.75rem;
            background: #444;
            padding: 4px 8px;
            border-radius: 20px;
            color: #ddd;
            font-weight: normal;
        }

        .game-btn:not(.disabled) .badge {
            background: rgba(241, 196, 15, 0.2);
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <header>
        <h1>ViajeVocab ✈️</h1>
        <p>Spanisch lernen spielerisch leicht</p>
    </header>

    <div class="container">
        <h2>1. Wähle eine Vokabelkategorie:</h2>
        <div class="category-grid">
            <button class="category-btn" onclick="waehleKategorie(this, 'reisen')">✈️ Reisen</button>
            <button class="category-btn" onclick="waehleKategorie(this, 'essen')">🍕 Essen & Trinken</button>
            <button class="category-btn" onclick="waehleKategorie(this, 'freizeit')">⚽ Freizeit & Sport</button>
            <button class="category-btn" onclick="waehleKategorie(this, 'schule')">📚 Schule & Studium</button>
        </div>
    </div>

    <div class="container">
        <h2>2. Wähle eine Spiele-Herausforderung:</h2>
        <div class="game-list">
            
            <button class="game-btn disabled" id="btn-quiz" onclick="startGame('Quiz gegen die Zeit')">
                <span>⏱️ Quiz gegen die Zeit</span>
                <span class="badge">Allrounder</span>
            </button>

            <button class="game-btn disabled" id="btn-snake" onclick="startGame('Snake II')">
                <span>🐍 Snake II</span>
                <span class="badge">Retro Action</span>
            </button>

            <button class="game-btn disabled" id="btn-koffer" onclick="startGame('Ich packe meinen Koffer')">
                <span>🧳 Ich packe meinen Koffer</span>
                <span class="badge">Kleidung</span>
            </button>

            <button class="game-btn disabled" id="btn-pizza" onclick="startGame('Pizza belegen')">
                <span>🍕 Pizza belegen</span>
                <span class="badge">Essen</span>
            </button>

            <button class="game-btn disabled" id="btn-amors" onclick="startGame('Amors Pfeil')">
                <span>💘 Amors Pfeil</span>
                <span class="badge">Dating & Liebe</span>
            </button>

            <button class="game-btn disabled" id="btn-highway" onclick="startGame('Highway to Bilingual')">
                <span>🚗 Highway to Bilingual</span>
                <span class="badge">Fahrzeuge</span>
            </button>

            <button class="game-btn disabled" id="btn-frosch" onclick="startGame('Der Frosch')">
                <span>🐸 Der Frosch</span>
                <span class="badge">Natur & Tiere</span>
            </button>

            <button class="game-btn disabled" id="btn-memory" onclick="startGame('Memory')">
                <span>🃏 Vokabel-Memory</span>
                <span class="badge">Karten</span>
            </button>
            
        </div>
    </div>

    <script>
        // Speichert das aktuell gewählte Thema ab
        let aktuelleKategorie = ""; 

        /**
         * Wird aufgerufen, wenn auf einen Kategorie-Button geklickt wird
         */
        function waehleKategorie(element, kategorieName) {
            // 1. Speichere das Thema (z.B. 'reisen' oder 'essen')
            aktuelleKategorie = kategorieName;

            // 2. Visuelles Feedback für die Buttons
            document.querySelectorAll('.category-grid .category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 3. ALLE Spiele-Buttons aktivieren (Klasse 'disabled' entfernen)
            document.querySelectorAll('.game-list .game-btn').forEach(btn => {
                btn.classList.remove('disabled');
            });
        }

        /**
         * Verarbeitet den Spielstart und leitet mit dem URL-Parameter weiter
         */
        function startGame(spielName) {
            // Schutzfunktion: Falls die Buttons gedrückt werden, bevor ein Thema gewählt ist
            if (!aktuelleKategorie) {
                alert("Bitte wähle zuerst oben eine passende Vokabelkategorie aus!");
                return;
            }

            let dateiPfad = "";

            // Pfade zu deinen tatsächlichen Spieldateien im Unterordner "spiele/"
            if (spielName === "Quiz gegen die Zeit") {
                dateiPfad = "spiele/quiz-zeit.html";
            } else if (spielName === "Snake II") {
                dateiPfad = "spiele/snake2.html";
            } else {
                // Das fängt alle Platzhalter-Spiele ab, die du noch hochladen möchtest
                alert(`Das Spiel "${spielName}" wird aktuell noch von uns entwickelt und steht bald bereit!`);
                return;
            }

            // Weiterleitung mit dem korrekten Suchparameter (z.B. ?kategorie=reisen)
            window.location.href = `${dateiPfad}?kategorie=${encodeURIComponent(aktuelleKategorie)}`;
        }
    </script>

</body>
</html>
